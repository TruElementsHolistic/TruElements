<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruElements — Market Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --card: #fdfaf7;
    --text: #2c2820;
    --muted: #8c7f74;
    --border: #e0d8d0;
    --shadow: rgba(60, 45, 30, 0.10);
    --accent: #a0836a;

    --air:      #8fb3c8;
    --air-bg:   #eef4f8;
    --fire:     #c87941;
    --fire-bg:  #fdf2ea;
    --water:    #5a8fa3;
    --water-bg: #eaf2f5;
    --earth:    #7d9165;
    --earth-bg: #f0f4ec;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 16px 60px;
    background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='40' cy='40' r='1.2' fill='%23c4b8ac' fill-opacity='0.3'/%3E%3C/svg%3E");
  }

  /* ─── HEADER ─── */
  .page-header {
    max-width: 600px;
    margin: 0 auto;
    padding: 44px 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-wrap img {
    width: 52px;
    height: 52px;
    object-fit: contain;
    opacity: 0.85;
  }
  .header-text h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 400;
    line-height: 1.1;
    color: var(--text);
  }
  .header-text p {
    font-size: 12px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-top: 3px;
  }
  .btn-back-link {
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.08em;
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 99px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-back-link:hover { color: var(--text); border-color: var(--text); }

  /* ─── MAIN LAYOUT ─── */
  .stats-wrap {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ─── SUMMARY CARD ─── */
  .summary-card {
    background: var(--card);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 32px var(--shadow);
    padding: 28px 28px 24px;
  }
  .summary-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .total-count {
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px;
    font-weight: 300;
    line-height: 1;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .total-label {
    font-size: 14px;
    font-weight: 300;
    color: var(--muted);
    margin-top: 4px;
  }
  .last-updated {
    font-size: 11px;
    font-weight: 300;
    color: var(--border);
    margin-top: 14px;
    letter-spacing: 0.04em;
  }

  /* ─── SECTION HEADING ─── */
  .section-heading {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 4px 4px;
  }

  /* ─── BUCKET CARD ─── */
  .bucket-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 420px) {
    .bucket-grid { grid-template-columns: 1fr; }
  }

  .bucket-card {
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 16px var(--shadow);
    padding: 20px 20px 16px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }
  .bucket-card:hover { transform: translateY(-2px); }

  .bucket-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .bucket-card.air::before   { background: var(--air); }
  .bucket-card.fire::before  { background: var(--fire); }
  .bucket-card.water::before { background: var(--water); }
  .bucket-card.earth::before { background: var(--earth); }

  .bucket-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .bucket-name {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .bucket-icon { font-size: 18px; }
  .bucket-element {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    line-height: 1;
  }
  .bucket-state-pill {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 99px;
  }
  .air   .bucket-state-pill { background: var(--air-bg);   color: var(--air);   }
  .fire  .bucket-state-pill { background: var(--fire-bg);  color: var(--fire);  }
  .water .bucket-state-pill { background: var(--water-bg); color: var(--water); }
  .earth .bucket-state-pill { background: var(--earth-bg); color: var(--earth); }

  .bucket-count {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    line-height: 1;
    margin-bottom: 8px;
  }
  .air   .bucket-count { color: var(--air);   }
  .fire  .bucket-count { color: var(--fire);  }
  .water .bucket-count { color: var(--water); }
  .earth .bucket-count { color: var(--earth); }

  /* ─── BAR ─── */
  .bucket-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .bucket-bar-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .bucket-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .air   .bucket-bar-fill { background: var(--air);   }
  .fire  .bucket-bar-fill { background: var(--fire);  }
  .water .bucket-bar-fill { background: var(--water); }
  .earth .bucket-bar-fill { background: var(--earth); }
  .bucket-pct {
    font-size: 11px;
    font-weight: 300;
    color: var(--muted);
    min-width: 32px;
    text-align: right;
  }

  /* ─── EMPTY / LOADING ─── */
  .status-msg {
    text-align: center;
    padding: 48px 20px;
    font-size: 14px;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.7;
  }

  /* ─── RESET ─── */
  .danger-zone {
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .danger-label {
    font-size: 13px;
    font-weight: 400;
    color: var(--text);
  }
  .danger-sub {
    font-size: 12px;
    font-weight: 300;
    color: var(--muted);
    margin-top: 2px;
  }
  .btn-reset {
    background: transparent;
    border: 1.5px solid #d9c4b8;
    color: #b08070;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 9px 18px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-reset:hover { background: #fdf0eb; border-color: #b08070; }

  /* ─── REFRESH ─── */
  .btn-refresh {
    display: block;
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    padding: 13px;
    border-radius: 12px;
    background: transparent;
    border: 1.5px solid var(--border);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.22s ease;
  }
  .btn-refresh:hover { border-color: var(--text); color: var(--text); background: #f7f1eb; }

  .site-footer {
    text-align: center;
    margin-top: 32px;
    font-size: 12px;
    font-weight: 300;
    color: #c4b8ac;
    letter-spacing: 0.08em;
  }
</style>
</head>

const STATS_URL = 'https://script.google.com/macros/s/AKfycbyAHWDUPwUPyWDvio9bAxi46vkLgKLseII-Fxw7FN-OIyQ0It_6lEkmVgz4nno60afh/exec';

async function loadStats() {
  document.getElementById('total-count').textContent = '—';
  document.getElementById('bucket-grid').innerHTML =
    '<div class="status-msg" style="grid-column:1/-1">Loading…</div>';

  if (!STATS_URL || STATS_URL === 'https://script.google.com/macros/s/AKfycbyAHWDUPwUPyWDvio9bAxi46vkLgKLseII-Fxw7FN-OIyQ0It_6lEkmVgz4nno60afh/exec') {
    document.getElementById('total-count').textContent = '—';
    document.getElementById('bucket-grid').innerHTML =
      '<div class="status-msg" style="grid-column:1/-1">⚙️ Paste your Apps Script URL into this file to see stats.<br><small style="opacity:.6">See the setup guide for instructions.</small></div>';
    return;
  }

  try {
    const res  = await fetch(STATS_URL + '?action=summary');
    const data = await res.json();

    const total = data.total || 0;
    document.getElementById('total-count').textContent = total;

    if (data.lastUpdated) {
      const d = new Date(data.lastUpdated);
      document.getElementById('last-updated').textContent =
        'Last entry: ' + d.toLocaleDateString('en-CA', {
          month:'long', day:'numeric', year:'numeric',
          hour:'2-digit', minute:'2-digit'
        });
    }

    if (total === 0) {
      document.getElementById('bucket-grid').innerHTML =
        '<div class="status-msg" style="grid-column:1/-1">No completions yet.<br>Bring this to your next market!</div>';
      return;
    }

    const counts = {};
    BUCKETS.forEach(b => {
      const key = `${b.element}:${b.state}`;
      counts[key] = (data.buckets && data.buckets[key]) || 0;
    });

    const sorted = [...BUCKETS].sort((a, b) =>
      (counts[`${b.element}:${b.state}`] || 0) - (counts[`${a.element}:${a.state}`] || 0)
    );

    const grid = document.getElementById('bucket-grid');
    grid.innerHTML = '';
    const max = Math.max(...Object.values(counts), 1);

    sorted.forEach(b => {
      const count = counts[`${b.element}:${b.state}`] || 0;
      const pct   = total > 0 ? Math.round((count / total) * 100) : 0;
      const barW  = Math.round((count / max) * 100);

      const card = document.createElement('div');
      card.className = `bucket-card ${b.cssClass}`;
      card.innerHTML = `
        <div class="bucket-top">
          <div class="bucket-name">
            <span class="bucket-icon">${b.icon}</span>
            <span class="bucket-element">${b.element}</span>
          </div>
          <span class="bucket-state-pill">${b.state}</span>
        </div>
        <div class="bucket-count">${count}</div>
        <div class="bucket-bar-wrap">
          <div class="bucket-bar-track">
            <div class="bucket-bar-fill" style="width:0%" data-target="${barW}%"></div>
          </div>
          <span class="bucket-pct">${pct}%</span>
        </div>
      `;
      grid.appendChild(card);
    });

    requestAnimationFrame(() => requestAnimationFrame(() => {
      grid.querySelectorAll('.bucket-bar-fill').forEach(el => {
        el.style.width = el.dataset.target;
      });
    }));

  } catch(err) {
    document.getElementById('bucket-grid').innerHTML =
      `<div class="status-msg" style="grid-column:1/-1">Could not load stats.<br><small style="opacity:.6">${err.message}</small></div>`;
  }
}

async function resetStats() {
  if (!confirm('Reset all stats in your Google Sheet? This cannot be undone.')) return;
  try {
    await fetch(STATS_URL + '?action=reset');
    loadStats();
  } catch(e) {
    alert('Could not reset: ' + e.message);
  }
}

document.getElementById('btn-refresh').addEventListener('click', loadStats);
document.getElementById('btn-reset').addEventListener('click', resetStats);

loadStats();
</script>
</body>
</html>
